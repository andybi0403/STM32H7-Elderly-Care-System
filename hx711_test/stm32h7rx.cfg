# stm32h7rx.cfg — STM32H7Rx/7Sx series
# KEY DIFFERENCE from standard H7: AP1 is AHB-AP, AP0 is APB-AP

source [find target/swj-dp.tcl]
source [find mem_helper.tcl]

if { [info exists CHIPNAME] } {
   set _CHIPNAME $CHIPNAME
} else {
   set _CHIPNAME stm32h7rx
}

set _ENDIAN little

if { [info exists WORKAREASIZE] } {
   set _WORKAREASIZE $WORKAREASIZE
} else {
   set _WORKAREASIZE 0x10000
}

if { [info exists CPUTAPID] } {
   set _CPUTAPID $CPUTAPID
} else {
   set _CPUTAPID 0x6ba02477
}

swj_newdap $_CHIPNAME cpu -irlen 4 -ircapture 0x1 -irmask 0xf -expected-id $_CPUTAPID
dap create $_CHIPNAME.dap -chain-position $_CHIPNAME.cpu

# AP1 = AHB-AP for system memory (H7RS specific!)
target create $_CHIPNAME.cpu0 cortex_m -endian $_ENDIAN -dap $_CHIPNAME.dap -ap-num 1

$_CHIPNAME.cpu0 configure -work-area-phys 0x20000000 -work-area-size $_WORKAREASIZE -work-area-backup 0

# 64KB flash at 0x08000000
flash bank $_CHIPNAME.bank1.cpu0 stm32h7x 0x08000000 0x10000 0 0 $_CHIPNAME.cpu0

adapter speed 1800
adapter srst delay 100
reset_config srst_nogate

$_CHIPNAME.cpu0 cortex_m reset_config sysresetreq

$_CHIPNAME.cpu0 configure -event reset-init {
    adapter speed 4000
}

targets $_CHIPNAME.cpu0
